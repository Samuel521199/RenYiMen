services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ai_workbench
      POSTGRES_PASSWORD: ai_workbench
      POSTGRES_DB: ai_workbench
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_workbench -d ai_workbench"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ./storage:/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    ports:
      - "3010:3000"
    depends_on:
      - backend

volumes:
  db_data:

