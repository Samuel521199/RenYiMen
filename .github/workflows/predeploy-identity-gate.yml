name: Predeploy Identity Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/workbench-predeploy-identity-check.mjs"
      - "scripts/workbench-identity-backfill.mjs"
      - "ai-workflow-code/backend/app/services/auth_service.py"
      - "ai-workflow-code/backend/app/routers/auth.py"
      - "ai-workflow-code/backend/app/routers/identity_conflicts.py"
      - "ai-workflow-code/backend/app/models/identity_conflict_ticket.py"
      - "ai-workflow-code/backend/app/models/user.py"
      - "ai-workflow-code/backend/migrations/**"
      - "docs/workbench-user-unification-phase2-step2.md"

jobs:
  predeploy-identity-check:
    runs-on: self-hosted
    timeout-minutes: 15
    env:
      PLATFORM_CONTAINER: ${{ vars.WORKFLOW_PLATFORM_DB_CONTAINER || 'workflow-db' }}
      PLATFORM_DB_USER: ${{ vars.WORKFLOW_PLATFORM_DB_USER || 'postgres' }}
      PLATFORM_DB_NAME: ${{ vars.WORKFLOW_PLATFORM_DB_NAME || 'workflow' }}
      WORKBENCH_CONTAINER: ${{ vars.WORKFLOW_WORKBENCH_DB_CONTAINER || 'workflow-workbench-db' }}
      WORKBENCH_DB_USER: ${{ vars.WORKFLOW_WORKBENCH_DB_USER || 'ai_workbench' }}
      WORKBENCH_DB_NAME: ${{ vars.WORKFLOW_WORKBENCH_DB_NAME || 'ai_workbench' }}
      MAX_PLATFORM_MISSING: ${{ vars.WORKFLOW_MAX_PLATFORM_MISSING || '0' }}
      MAX_POTENTIAL_CONFLICTS: ${{ vars.WORKFLOW_MAX_POTENTIAL_CONFLICTS || '0' }}
      MAX_UNBOUND_WORKBENCH: ${{ vars.WORKFLOW_MAX_UNBOUND_WORKBENCH || '0' }}
      MAX_ROLE_DRIFT: ${{ vars.WORKFLOW_MAX_ROLE_DRIFT || '1' }}
      MAX_EMAIL_DRIFT: ${{ vars.WORKFLOW_MAX_EMAIL_DRIFT || '0' }}
      MAX_RECENT_CONFLICT_AUDIT_LOGS: ${{ vars.WORKFLOW_MAX_RECENT_CONFLICT_AUDIT_LOGS || '0' }}
      MAX_OPEN_CONFLICT_TICKETS: ${{ vars.WORKFLOW_MAX_OPEN_CONFLICT_TICKETS || '0' }}
      SINCE_HOURS: ${{ vars.WORKFLOW_CONFLICT_SINCE_HOURS || '168' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify DB containers are running
        shell: bash
        run: |
          set -euo pipefail
          names="$(docker ps --format '{{.Names}}')"
          echo "$names"
          echo "$names" | grep -x "$PLATFORM_CONTAINER" >/dev/null
          echo "$names" | grep -x "$WORKBENCH_CONTAINER" >/dev/null

      - name: Run strict predeploy identity check
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports
          node scripts/workbench-predeploy-identity-check.mjs \
            --strict \
            --platform-container "$PLATFORM_CONTAINER" \
            --platform-db-user "$PLATFORM_DB_USER" \
            --platform-db-name "$PLATFORM_DB_NAME" \
            --workbench-container "$WORKBENCH_CONTAINER" \
            --workbench-db-user "$WORKBENCH_DB_USER" \
            --workbench-db-name "$WORKBENCH_DB_NAME" \
            --max-platform-missing "$MAX_PLATFORM_MISSING" \
            --max-potential-conflicts "$MAX_POTENTIAL_CONFLICTS" \
            --max-unbound-workbench "$MAX_UNBOUND_WORKBENCH" \
            --max-role-drift "$MAX_ROLE_DRIFT" \
            --max-email-drift "$MAX_EMAIL_DRIFT" \
            --max-recent-conflict-audit-logs "$MAX_RECENT_CONFLICT_AUDIT_LOGS" \
            --max-open-conflict-tickets "$MAX_OPEN_CONFLICT_TICKETS" \
            --since-hours "$SINCE_HOURS" \
            --report reports/ci-predeploy-identity-check.json

      - name: Upload identity-check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-predeploy-identity-check
          path: reports/ci-predeploy-identity-check.json
