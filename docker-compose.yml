services:
  db:
    image: postgres:15-alpine
    container_name: workflow-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: workflow
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    # ⚠️ 数据库端口不对外暴露，只在 Docker 内网访问
    expose:
      - "5432"
    # 调试时可临时开启（开完立刻注释回来）：
    # ports:
    #   - "127.0.0.1:5433:5432"   ← 绑定 127.0.0.1，只本机可访问

  workbench-db:
    image: postgres:16-alpine
    container_name: workflow-workbench-db
    restart: always
    environment:
      POSTGRES_USER: ai_workbench
      POSTGRES_PASSWORD: ${WORKBENCH_POSTGRES_PASSWORD:-ai_workbench}
      POSTGRES_DB: ai_workbench
    volumes:
      - ./workbench-postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_workbench -d ai_workbench"]
      interval: 5s
      timeout: 5s
      retries: 10

  workbench-redis:
    image: redis:7-alpine
    container_name: workflow-workbench-redis
    restart: always
    # Redis 加密码（REDIS_PASSWORD 在 .env 中设置）
    command: >
      sh -c '
        if [ -n "$$REDIS_PASSWORD" ]; then
          redis-server --requirepass "$$REDIS_PASSWORD"
        else
          redis-server
        fi
      '
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    expose:
      - "6379"
    healthcheck:
      test: >
        sh -c '
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" ping
          else
            redis-cli ping
          fi
        '
      interval: 5s
      timeout: 5s
      retries: 10

  workbench-backend:
    container_name: workflow-workbench-backend
    image: workflow-workbench-backend:latest
    restart: always
    build:
      context: ./ai-workflow-code/backend
    env_file:
      - ./ai-workflow-code/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://ai_workbench:${WORKBENCH_POSTGRES_PASSWORD_ENCODED:-${WORKBENCH_POSTGRES_PASSWORD:-ai_workbench}}@workbench-db:5432/ai_workbench
      REDIS_URL: ${REDIS_PASSWORD:+redis://:${REDIS_PASSWORD}@}${REDIS_PASSWORD:-redis://}workbench-redis:6379/0
      STORAGE_LOCAL_PATH: /storage
      STATIC_CACHE_MAX_AGE: ${STATIC_CACHE_MAX_AGE:-86400}
      WORKBENCH_SSO_SECRET: ${WORKBENCH_SSO_SECRET:-change-me-workbench-sso-secret}
    volumes:
      - ./ai-workflow-data/storage:/storage
    expose:
      - "8000"
    # 本地开发端口映射已移至 docker-compose.dev.yml，生产环境走 Docker 内网即可
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/api/system/disk-usage >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      workbench-db:
        condition: service_healthy
      workbench-redis:
        condition: service_healthy

  web:
    container_name: workflow-web
    image: workflow-web:latest
    restart: always
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
    expose:
      - "3001"
    ports:
      # 直连调试端口；生产建议仅通过 nginx 访问
      - "${WEB_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/auth/session >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - db
      - workbench-backend
    env_file:
      - .env
    environment:
      # 用 POSTGRES_PASSWORD_ENCODED（URL 编码版）构造连接串，避免密码含 /+= 等字符破坏 URL 解析
      # 若密码不含特殊字符，POSTGRES_PASSWORD_ENCODED 与 POSTGRES_PASSWORD 相同即可
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD_ENCODED:-${POSTGRES_PASSWORD:-postgres}}@db:5432/workflow?schema=public
      WORKBENCH_BACKEND_URL: http://workbench-backend:8000
      WORKBENCH_STATIC_CACHE_MAX_AGE: ${WORKBENCH_STATIC_CACHE_MAX_AGE:-86400}
      WORKBENCH_SSO_SECRET: ${WORKBENCH_SSO_SECRET:-change-me-workbench-sso-secret}
      NODE_ENV: production

  nginx:
    container_name: workflow-nginx
    image: nginx:1.27-alpine
    restart: always
    depends_on:
      - web
      - workbench-backend
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_static_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  # 一次性执行迁移（不会随 docker compose up 自动跑）
  # 宿主必须存在：./prisma/schema.prisma 与 ./prisma/migrations/（从本仓库原样上传整个 prisma 目录）
  migrate:
    profiles: ["migrate"]
    image: node:18-alpine
    working_dir: /work
    volumes:
      - ./prisma:/work/prisma:ro
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD_ENCODED:-${POSTGRES_PASSWORD:-postgres}}@db:5432/workflow?schema=public
    command:
      - sh
      - -c
      - |
        set -eu
        apk add --no-cache openssl libc6-compat
        if [ ! -f /work/prisma/schema.prisma ]; then
          echo "[migrate] 未找到 /work/prisma/schema.prisma"
          echo "[migrate] 请在 compose 所在目录确认宿主文件存在: prisma/schema.prisma"
          ls -la /work/prisma 2>/dev/null || echo "[migrate] 宿主 ./prisma 未挂载或目录为空（请上传整个 prisma 文件夹）"
          exit 1
        fi
        cd /work
        npm install prisma@6.19.3
        exec npx prisma migrate deploy --schema=/work/prisma/schema.prisma
    depends_on:
      - db
    restart: "no"

volumes:
  nginx_static_cache:
