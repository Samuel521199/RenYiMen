proxy_cache_path /var/cache/nginx/workbench_static
    levels=1:2
    keys_zone=workbench_static_cache:20m
    max_size=2g
    inactive=7d
    use_temp_path=off;

upstream workflow_web {
    server web:3001;
    keepalive 32;
}

upstream workbench_backend {
    server workbench-backend:8000;
    keepalive 16;
}

# 压缩文本类响应，减轻页面/API 传输体积
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 5;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    text/xml
    application/xml
    application/xml+rss
    text/javascript
    image/svg+xml;

server {
    listen 80;
    server_name _;

    client_max_body_size 500m;

    # 素材/成品静态图：直连后端并启用 Nginx 磁盘缓存，绕过 Next.js
    location /api/workbench/static/ {
        proxy_pass http://workbench_backend/static/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache workbench_static_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 206 1d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_lock on;
        proxy_cache_background_update on;
        add_header X-Cache-Status $upstream_cache_status always;
        expires 1d;
        add_header Cache-Control "public, max-age=86400, must-revalidate" always;
    }

    # 其余请求（页面、/api/workbench API、NextAuth 等）走 Next.js
    location / {
        proxy_pass http://workflow_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }
}
